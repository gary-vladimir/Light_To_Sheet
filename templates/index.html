<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Light to Sheet</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Light to Sheet</h1>
      <p class="subtitle">Convert Synthesia piano videos to sheet music</p>
    </header>

    <main>
      <!-- Input Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="youtube">YouTube URL</button>
        <button class="tab" data-tab="upload">Upload Video</button>
      </div>

      <form id="process-form">
        <!-- YouTube URL input -->
        <div class="tab-content active" id="tab-youtube">
          <input
            type="url"
            name="youtube_url"
            id="youtube-url"
            placeholder="https://www.youtube.com/watch?v=..."
            autocomplete="off"
          >
        </div>

        <!-- File upload input -->
        <div class="tab-content" id="tab-upload">
          <label class="file-upload" id="file-label">
            <input type="file" name="video_file" id="video-file" accept="video/*">
            <span>Choose a video file</span>
          </label>
        </div>

        <button type="submit" id="submit-btn">Process Video</button>
      </form>

      <!-- Loading state -->
      <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p>Processing video... this may take a moment.</p>
      </div>

      <!-- Error message -->
      <div id="error" class="hidden">
        <p id="error-text"></p>
      </div>

      <!-- Results -->
      <div id="results" class="hidden">
        <!-- Frame Preview (independent from sheet music) -->
        <div id="frame-preview" class="hidden">
          <h2>Frame Preview</h2>
          <div class="preview-controls">
            <button type="button" id="prev-frame" class="preview-btn" disabled>&larr; Prev</button>
            <span id="frame-counter">Frame 0 / 0</span>
            <button type="button" id="next-frame" class="preview-btn">Next &rarr;</button>
          </div>
          <div class="preview-image-wrapper">
            <img id="preview-img" alt="Frame preview">
          </div>
        </div>

        <h2>Sheet Music</h2>
        <div class="sheet-music-wrapper">
          <pre id="sheet-music"></pre>
        </div>

        <h2>Download Files</h2>
        <div class="downloads" id="downloads"></div>
      </div>
    </main>
  </div>

  <script>
    const form = document.getElementById('process-form');
    const submitBtn = document.getElementById('submit-btn');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const errorText = document.getElementById('error-text');
    const results = document.getElementById('results');
    const sheetMusic = document.getElementById('sheet-music');
    const downloads = document.getElementById('downloads');
    const youtubeInput = document.getElementById('youtube-url');
    const fileInput = document.getElementById('video-file');
    const fileLabel = document.getElementById('file-label');

    // Frame preview elements
    const framePreview = document.getElementById('frame-preview');
    const prevBtn = document.getElementById('prev-frame');
    const nextBtn = document.getElementById('next-frame');
    const frameCounter = document.getElementById('frame-counter');
    const previewImg = document.getElementById('preview-img');

    let activeTab = 'youtube';

    // Frame preview state
    let previewFrames = [];
    let currentFrameIndex = 0;
    let currentJobId = null;

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

        tab.classList.add('active');
        activeTab = tab.dataset.tab;
        document.getElementById('tab-' + activeTab).classList.add('active');
      });
    });

    // Show selected filename
    fileInput.addEventListener('change', () => {
      const name = fileInput.files[0]?.name;
      if (name) {
        fileLabel.querySelector('span').textContent = name;
      }
    });

    // Form submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData();

      if (activeTab === 'youtube') {
        const url = youtubeInput.value.trim();
        if (!url) { showError('Please enter a YouTube URL.'); return; }
        formData.append('youtube_url', url);
      } else {
        const file = fileInput.files[0];
        if (!file) { showError('Please select a video file.'); return; }
        formData.append('video_file', file);
      }

      // Show loading, hide others
      submitBtn.disabled = true;
      loading.classList.remove('hidden');
      error.classList.add('hidden');
      results.classList.add('hidden');
      framePreview.classList.add('hidden');

      try {
        const resp = await fetch('/api/process', { method: 'POST', body: formData });
        const data = await resp.json();

        if (!resp.ok) {
          showError(data.error || 'Processing failed.');
          return;
        }

        currentJobId = data.job_id;

        // Display sheet music
        sheetMusic.textContent = data.sheet_music;

        // Build download buttons
        downloads.innerHTML = '';
        for (const filename of data.files) {
          const a = document.createElement('a');
          a.href = '/api/download/' + data.job_id + '/' + filename;
          a.className = 'download-btn';
          a.download = filename;
          a.textContent = filename;
          downloads.appendChild(a);
        }

        // Set up frame preview
        previewFrames = data.preview_frames || [];
        if (previewFrames.length > 0) {
          currentFrameIndex = 0;
          showFrame(0);
          framePreview.classList.remove('hidden');
        } else {
          framePreview.classList.add('hidden');
        }

        results.classList.remove('hidden');
      } catch (err) {
        showError('Request failed. Please try again.');
      } finally {
        loading.classList.add('hidden');
        submitBtn.disabled = false;
      }
    });

    // --- Frame preview navigation ---

    function showFrame(index) {
      if (index < 0 || index >= previewFrames.length) return;
      currentFrameIndex = index;
      const filename = previewFrames[index];
      previewImg.src = '/api/preview/' + currentJobId + '/' + filename;

      // Extract original frame number from filename (e.g., "frame_000042.jpg" → 42)
      const match = filename.match(/frame_(\d+)\.jpg/);
      const frameNum = match ? parseInt(match[1], 10) : index;
      frameCounter.textContent = 'Frame ' + frameNum + '  (' + (index + 1) + ' / ' + previewFrames.length + ')';

      // Enable/disable buttons at boundaries
      prevBtn.disabled = (index === 0);
      nextBtn.disabled = (index === previewFrames.length - 1);
    }

    prevBtn.addEventListener('click', () => showFrame(currentFrameIndex - 1));
    nextBtn.addEventListener('click', () => showFrame(currentFrameIndex + 1));

    // Keyboard arrow navigation (only when preview is visible)
    document.addEventListener('keydown', (e) => {
      if (framePreview.classList.contains('hidden')) return;
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        showFrame(currentFrameIndex - 1);
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        showFrame(currentFrameIndex + 1);
      }
    });

    function showError(msg) {
      errorText.textContent = msg;
      error.classList.remove('hidden');
      loading.classList.add('hidden');
      submitBtn.disabled = false;
    }
  </script>
</body>
</html>
